name: Publish Container Image

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  push_to_registry:
    name: Build and push image to quay.io/oraz/vigil
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
          registry: quay.io

      - name: Build and push image
        run: make container-build-and-push

      - name: Commit changelog if generated
        run: |
          if git diff --quiet -- docs/ && ! git ls-files --others --exclude-standard docs/ | grep -q .; then
            echo "No changelog generated (not a milestone build)"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/changelog-*.md
            git commit -m "Add changelog for milestone build"
            git push
          fi
