name: Publish Container Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  push_to_registry:
    name: Build and push image to quay.io/oraz/vigil
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
          registry: quay.io

      - name: Build and push latest image
        if: ${{ github.ref_type != 'tag' }}
        run: make container-build-and-push

      - name: Build and push versioned image
        if: ${{ github.ref_type == 'tag' }}
        run: IMAGE_TAG=$GITHUB_REF_NAME make container-build-and-push

      - name: Detect milestone build
        if: ${{ github.ref_type != 'tag' }}
        id: milestone
        run: |
          VERSION=$(grep '^VERSION ?=' Makefile | awk '{print $3}')
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_BASE=$(git rev-list --count "v${VERSION}" 2>/dev/null || echo "$COMMIT_COUNT")
          COMMITS_SINCE=$(( COMMIT_COUNT - VERSION_BASE ))
          BUILD_NUMBER=$(( COMMITS_SINCE / 10 + 1 ))
          LATEST_BUILD=$(git tag -l "v${VERSION}-*" | grep -oP '(?<=-)\d+(?=-)' | sort -n | tail -1)
          LATEST_BUILD=${LATEST_BUILD:-0}
          if [ "$BUILD_NUMBER" -gt "$LATEST_BUILD" ]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            IMAGE_TAG="v${VERSION}-${BUILD_NUMBER}-${SHORT_SHA}"
            echo "is_milestone=true" >> "$GITHUB_OUTPUT"
            echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "is_milestone=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog and create tag
        if: ${{ github.ref_type != 'tag' && steps.milestone.outputs.is_milestone == 'true' }}
        env:
          IMAGE_TAG: ${{ steps.milestone.outputs.image_tag }}
        run: |
          make changelog
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/v*/
          if ! git diff --cached --quiet; then
            git commit -m "Add changelog for ${IMAGE_TAG}"
            git push
          fi
          git tag "${IMAGE_TAG}"
          git push origin "${IMAGE_TAG}"
