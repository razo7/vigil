name: Weekly CVE Scan

on:
  schedule:
    # Every Monday at 07:03 UTC (off-minute to avoid :00 stampede)
    - cron: '3 7 * * 1'
  workflow_dispatch:
    inputs:
      components:
        description: 'Components to scan (JSON array)'
        type: string
        default: '["NMO"]'

permissions:
  contents: read

env:
  IMAGE: quay.io/oraz/vigil:latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Resolve components
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'matrix=["FAR","MDR","NHC","SNR","NMO"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=${{ inputs.components }}' >> "$GITHUB_OUTPUT"
          fi

  scan:
    name: Scan ${{ matrix.component }}
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - name: Pull Vigil image
        run: docker pull ${{ env.IMAGE }}

      # --go-version: GitHub Actions runners have no VPN access to gitlab.cee.redhat.com,
      # so downstream Containerfile fetch fails. Provide Go version explicitly to skip it.
      - name: Run scan
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --short --go-version 1.25.9 \
            2>&1 | tee ${{ matrix.component }}-raw.txt

          # Clean copy for artifact (no ANSI/OSC codes)
          sed 's/\x1b\[[0-9;]*m//g; s/\x1b]8;;[^\x1b]*\x1b\\//g' \
            ${{ matrix.component }}-raw.txt > ${{ matrix.component }}-scan.txt

      - name: Run scan (HTML report)
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --format html --verbose --go-version 1.25.9 \
            > ${{ matrix.component }}-report.html 2>${{ matrix.component }}-html-stderr.txt || true

      - name: Post summary
        if: always()
        run: |
          CLEAN=$(cat ${{ matrix.component }}-scan.txt)
          SUMMARY=$(echo "${CLEAN}" | tail -1)
          echo "::notice title=ЁЯФН Vigil ${{ matrix.component }}::${SUMMARY}"

          {
            echo "## ЁЯФН Vigil Scan: ${{ matrix.component }}"
            echo ""
            echo "**Result:** ${SUMMARY}"
            echo ""

            # Build markdown table from scan output
            HEADER=$(echo "${CLEAN}" | grep "^SRC" | head -1)
            if [ -n "${HEADER}" ]; then
              # Convert space-aligned columns to markdown table
              echo "| SRC | TICKET | CREATED | UPDATED | CVE | VERSION | LANG | STATUS | CLASSIFICATION | PRIORITY | PACKAGE | CVSS | REACHABILITY |"
              echo "|-----|--------|---------|---------|-----|---------|------|--------|----------------|----------|---------|------|--------------|"
              echo "${CLEAN}" | grep -E "^(Jira |GVC  |Trivy )" | grep -v "Trivy found" | while IFS= read -r line; do
                # Parse fixed-width columns into pipe-delimited
                src=$(echo "$line" | awk '{print $1}')
                ticket=$(echo "$line" | awk '{print $2}')
                created=$(echo "$line" | awk '{print $3}')
                updated=$(echo "$line" | awk '{print $4}')
                cve=$(echo "$line" | awk '{print $5}')
                ver=$(echo "$line" | awk '{print $6}')
                lang=$(echo "$line" | awk '{print $7}')
                status=$(echo "$line" | awk '{print $8}')
                # Classification and beyond are multi-word, grab from known positions
                rest=$(echo "$line" | sed 's/^[^ ]* *[^ ]* *[^ ]* *[^ ]* *[^ ]* *[^ ]* *[^ ]* *[^ ]* *//')
                class=$(echo "$rest" | awk '{print $1" "$2}')
                prio=$(echo "$rest" | awk '{print $3}')
                pkg=$(echo "$rest" | awk '{print $4}')
                cvss=$(echo "$rest" | awk '{print $5}')
                reach=$(echo "$rest" | awk '{for(i=6;i<=NF;i++) printf "%s ", $i; print ""}' | sed 's/ *$//')

                # Add emojis
                case "$class" in
                  *"Fixable Now"*) class="ЁЯФ┤ЁЯФз Fixable Now" ;;
                  *"Not Reachable"*) class="ЁЯЯвтЬУ Not Reachable" ;;
                  *"Blocked"*) class="ЁЯЯатП│ Blocked" ;;
                  *"Not Go"*) class="ЁЯРН Not Go" ;;
                  *"Misassigned"*) class="тЖйя╕П Misassigned" ;;
                esac
                case "$prio" in
                  Critical) prio="ЁЯФ┤ Critical" ;;
                  High) prio="ЁЯЯа High" ;;
                  Medium) prio="ЁЯЯб Medium" ;;
                  Low) prio="ЁЯЯв Low" ;;
                esac
                case "$reach" in
                  REACHABLE*) reach="ЁЯОп $reach" ;;
                  PACKAGE*) reach="ЁЯУж $reach" ;;
                  MODULE*) reach="ЁЯУЛ $reach" ;;
                  NOT-IMPORTED*) reach="ЁЯЪл $reach" ;;
                  TEST-ONLY*) reach="ЁЯзк $reach" ;;
                esac

                echo "| $src | $ticket | $created | $updated | $cve | $ver | $lang | $status | $class | $prio | $pkg | $cvss | $reach |"
              done
            fi
            echo ""
            echo "<details><summary>ЁЯУД Raw scan output</summary>"
            echo ""
            echo '```'
            echo "${CLEAN}"
            echo '```'
            echo "</details>"
            echo ""
            echo "ЁЯУО Download the full **HTML report** from [Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts) for charts and diagrams."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: vigil-${{ matrix.component }}-${{ github.run_number }}
          path: |
            ${{ matrix.component }}-scan.txt
            ${{ matrix.component }}-report.html
          retention-days: 90
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.setup.outputs.matrix) }}

  summary:
    name: Consolidated Summary
    needs: scan
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vigil-*
          merge-multiple: true

      - name: Build consolidated summary
        run: |
          {
            echo "# ЁЯФН Vigil Weekly CVE Scan"
            echo ""
            echo "| Component | Assessed | Fixable | Not Reachable | Discovered | Full Result |"
            echo "|-----------|----------|---------|---------------|------------|-------------|"
            for f in *-scan.txt; do
              COMP=$(basename "$f" -scan.txt)
              SUMMARY=$(tail -1 "$f")
              assessed=$(echo "$SUMMARY" | grep -oP '\d+ assessed' || echo "0 assessed")
              fixable=$(echo "$SUMMARY" | grep -oP '\d+ fixable' || echo "0 fixable")
              notreach=$(echo "$SUMMARY" | grep -oP '\d+ not-reachable' || echo "0 not-reachable")
              disc=$(echo "$SUMMARY" | grep -oP '\d+ discovered[^,]*' || echo "0 discovered")
              echo "| **${COMP}** | ${assessed} | ${fixable} | ${notreach} | ${disc} | ${SUMMARY} |"
            done
            echo ""
            echo "ЁЯУО Download HTML reports from [Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts) below."
          } >> "$GITHUB_STEP_SUMMARY"

      # Slack integration placeholder тАФ uncomment and set SLACK_WEBHOOK_URL secret when ready
