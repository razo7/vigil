name: Weekly CVE Scan

on:
  schedule:
    # Every Monday at 07:03 UTC (off-minute to avoid :00 stampede)
    - cron: '3 7 * * 1'
  workflow_dispatch:
    inputs:
      components:
        description: 'Components to scan (JSON array)'
        type: string
        default: '["NMO"]'

permissions:
  contents: read

env:
  IMAGE: quay.io/oraz/vigil:latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Resolve components
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'matrix=["FAR","MDR","NHC","SNR","NMO"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=${{ inputs.components }}' >> "$GITHUB_OUTPUT"
          fi

  scan:
    name: Scan ${{ matrix.component }}
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - name: Pull Vigil image
        run: docker pull ${{ env.IMAGE }}

      # --go-version: GitHub Actions runners have no VPN access to gitlab.cee.redhat.com,
      # so downstream Containerfile fetch fails. Use latest downstream Go version per
      # component, fetched via skopeo on 2026-06-02 from downstream Containerfiles.
      # Base image: brew.registry.redhat.io/rh-osbs/openshift-golang-builder
      - name: Resolve downstream Go version
        id: goversion
        run: |
          case "${{ matrix.component }}" in
            FAR) echo "version=1.25" >> "$GITHUB_OUTPUT" ;;
            MDR) echo "version=1.25" >> "$GITHUB_OUTPUT" ;;
            SNR) echo "version=1.25" >> "$GITHUB_OUTPUT" ;;
            NHC) echo "version=1.25" >> "$GITHUB_OUTPUT" ;;
            NMO) echo "version=1.25" >> "$GITHUB_OUTPUT" ;;
            *)   echo "version=1.25" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run scan
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          GO_VERSION: ${{ steps.goversion.outputs.version }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --short --go-version "$GO_VERSION" \
            2>&1 | tee ${{ matrix.component }}-raw.txt

          # Clean copy for artifact (no ANSI/OSC codes)
          sed 's/\x1b\[[0-9;]*m//g; s/\x1b]8;;[^\x1b]*\x1b\\//g' \
            ${{ matrix.component }}-raw.txt > ${{ matrix.component }}-scan.txt

      - name: Run scan (HTML report)
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          GO_VERSION: ${{ steps.goversion.outputs.version }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --format html --verbose --blame --go-version "$GO_VERSION" \
            > ${{ matrix.component }}-report.html 2>${{ matrix.component }}-html-stderr.txt || true

      - name: Post summary
        if: always()
        run: |
          CLEAN=$(cat ${{ matrix.component }}-scan.txt)
          SUMMARY=$(echo "${CLEAN}" | tail -1)
          echo "::notice title=🔍 Vigil ${{ matrix.component }}::${SUMMARY}"

          {
            echo "## 🔍 Vigil Scan: ${{ matrix.component }}"
            echo ""
            echo "**Result:** ${SUMMARY}"
            echo ""
            echo "<details><summary>📄 Raw scan output</summary>"
            echo ""
            echo '```'
            echo "${CLEAN}"
            echo '```'
            echo "</details>"
            echo ""
            echo "📎 Download the full **HTML report** from [Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts) for charts and diagrams."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload component data
        uses: actions/upload-artifact@v4
        with:
          name: scan-data-${{ matrix.component }}
          path: |
            ${{ matrix.component }}-scan.txt
            ${{ matrix.component }}-report.html
          retention-days: 7
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.setup.outputs.matrix) }}

  report:
    name: Weekly Report
    needs: scan
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scan-data-*
          merge-multiple: true

      - name: Build consolidated summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "# 🔍 Vigil Weekly CVE Scan"
            echo ""
            echo "| Component | Jira | Fixable | Not Reachable | Discovered | Full Result |"
            echo "|-----------|----------|---------|---------------|------------|-------------|"
            for f in *-scan.txt; do
              COMP=$(basename "$f" -scan.txt)
              SUMMARY=$(tail -1 "$f")
              assessed=$(echo "$SUMMARY" | grep -oP '\d+ Jira' || echo "0 Jira tickets")
              fixable=$(echo "$SUMMARY" | grep -oP '\d+ fixable' || echo "0 fixable")
              notreach=$(echo "$SUMMARY" | grep -oP '\d+ not-reachable' || echo "0 not-reachable")
              disc=$(echo "$SUMMARY" | grep -oP '\d+ discovered[^,]*' || echo "0 discovered")
              echo "| **${COMP}** | ${assessed} | ${fixable} | ${notreach} | ${disc} | ${SUMMARY} |"
            done
            echo ""
            echo "📎 Download HTML reports from [Artifacts](${RUN_URL}#artifacts) below."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build consolidated summary
        run: |
          cat > consolidated-report.html <<'HTMLEOF'
          <!DOCTYPE html><html><head><meta charset="utf-8">
          <title>Vigil Weekly Report</title>
          <style>
          body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:20px;color:#24292e;max-width:1200px;margin:0 auto;padding:20px}
          h1{border-bottom:2px solid #24292e;padding-bottom:8px}
          .summary-cards{display:flex;flex-wrap:wrap;gap:12px;margin:16px 0}
          .summary-card{background:#fff;border:1px solid #e1e4e8;border-radius:8px;padding:12px 16px;flex:1;min-width:200px;cursor:pointer;transition:box-shadow 0.2s}
          .summary-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.15)}
          .summary-card h3{margin:0 0 4px;font-size:14px}
          .summary-card .result{font-size:12px;color:#586069}
          .tag{padding:2px 8px;border-radius:12px;color:#fff;font-size:11px;font-weight:600;display:inline-block}
          table{border-collapse:collapse;width:100%;font-size:13px;margin:16px 0}
          th{background:#24292e;color:#fff;padding:8px 10px;text-align:left;cursor:pointer}
          td{padding:6px 10px;border-bottom:1px solid #e1e4e8}
          tr:hover{background:#f6f8fa}
          tr:nth-child(even){background:#fafbfc}
          .tabs{display:flex;gap:0;border-bottom:2px solid #e1e4e8;margin:16px 0}
          .tab{padding:8px 16px;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;font-weight:600;color:#586069;background:#f6f8fa}
          .tab.active{color:#24292e;background:#fff;border-color:#e1e4e8}
          .tab-content{display:none}
          .tab-content.active{display:block}
          pre{background:#f6f8fa;padding:12px;border-radius:6px;overflow-x:auto;font-size:12px}
          </style></head><body>
          <h1>🔍 Vigil Weekly CVE Scan</h1>
          HTMLEOF

          echo "<p>Generated: $(date -u '+%Y-%m-%d %H:%M UTC')</p>" >> consolidated-report.html

          # Summary cards
          echo '<div class="summary-cards">' >> consolidated-report.html
          total_assessed=0
          total_fixable=0
          total_notreach=0
          total_discovered=0
          for f in *-scan.txt; do
            COMP=$(basename "$f" -scan.txt)
            SUMMARY=$(tail -1 "$f")
            assessed=$(echo "$SUMMARY" | grep -oP '\d+ Jira' | grep -oP '\d+' || echo 0)
            fixable=$(echo "$SUMMARY" | grep -oP '\d+ fixable' | grep -oP '\d+' || echo 0)
            total_assessed=$((total_assessed + assessed))
            total_fixable=$((total_fixable + fixable))
            echo "<div class='summary-card' onclick=\"showTab('${COMP}')\">" >> consolidated-report.html
            echo "<h3>📦 ${COMP}</h3>" >> consolidated-report.html
            echo "<div class='result'>${SUMMARY}</div>" >> consolidated-report.html
            echo "</div>" >> consolidated-report.html
          done
          echo '</div>' >> consolidated-report.html

          total_cves=0
          for f in *-scan.txt; do
            tc=$(tail -1 "$f" | grep -oP '^\d+' || echo 0)
            total_cves=$((total_cves + tc))
          done
          echo "<p><strong>Total:</strong> ${total_cves} CVEs, ${total_fixable} fixable across $(ls *-scan.txt | wc -l) components</p>" >> consolidated-report.html

          # Tabs
          echo '<div class="tabs">' >> consolidated-report.html
          echo '<div class="tab active" onclick="showTab('\''ALL'\'')">ALL</div>' >> consolidated-report.html
          for f in *-scan.txt; do
            COMP=$(basename "$f" -scan.txt)
            echo "<div class=\"tab\" onclick=\"showTab('${COMP}')\">${COMP}</div>" >> consolidated-report.html
          done
          echo '</div>' >> consolidated-report.html

          # ALL tab — executive summary + dashboard
          echo '<div id="tab-ALL" class="tab-content active">' >> consolidated-report.html

          # Parse totals from new summary format: "N CVEs: X fixable, Y not-reachable (M Jira, K discovered)"
          t_total=0; t_fix=0; t_nr=0; t_jira=0; t_disc=0; t_errs=0
          num_comps=0
          for f in *-scan.txt; do
            S=$(tail -1 "$f")
            total_cves=$(echo "$S" | grep -oP '^\d+' || echo 0)
            fix=$(echo "$S" | grep -oP '\d+(?= fixable)' || echo 0)
            nr=$(echo "$S" | grep -oP '\d+(?= not-reachable)' || echo 0)
            jira=$(echo "$S" | grep -oP '\d+(?= Jira)' || echo 0)
            disc=$(echo "$S" | grep -oP '\d+(?= discovered)' || echo 0)
            errs=$(echo "$S" | grep -oP '\d+(?= errors)' || echo 0)
            t_total=$((t_total + total_cves))
            t_fix=$((t_fix + fix)); t_nr=$((t_nr + nr))
            t_jira=$((t_jira + jira)); t_disc=$((t_disc + disc))
            t_errs=$((t_errs + errs))
            num_comps=$((num_comps + 1))
          done
          t_skip=$((t_total - t_fix - t_nr))
          [ "$t_skip" -lt 0 ] && t_skip=0

          # Executive summary
          echo '<div style="background:#fff;border:1px solid #e1e4e8;border-radius:8px;padding:20px;margin:16px 0">' >> consolidated-report.html
          echo '<h2 style="margin-top:0">Executive Summary</h2>' >> consolidated-report.html
          echo "<p style='font-size:15px;line-height:1.6'>" >> consolidated-report.html
          echo "Vigil scanned <strong>${num_comps} components</strong> across all supported release branches and found <strong>${t_total} unique CVEs</strong> (${t_jira} from Jira tickets, ${t_disc} discovered by govulncheck)." >> consolidated-report.html
          echo "</p>" >> consolidated-report.html
          echo '<ul style="font-size:15px;line-height:1.8">' >> consolidated-report.html
          echo "<li>🔴 <strong>${t_fix} fixable</strong> — fixes available and deployable</li>" >> consolidated-report.html
          echo "<li>🟢 <strong>${t_nr} safe</strong> — vulnerable code is not reachable</li>" >> consolidated-report.html
          if [ "$t_skip" -gt 0 ]; then
            echo "<li>🟡 <strong>${t_skip} skipped or no action</strong> — lifecycle-unqualified or module-level only</li>" >> consolidated-report.html
          fi
          if [ "$t_errs" -gt 0 ]; then
            echo "<li>⚠️ <strong>${t_errs} errors</strong> during scanning</li>" >> consolidated-report.html
          fi
          echo '</ul>' >> consolidated-report.html

          # Bottom line
          if [ "$t_fix" -gt 0 ]; then
            echo "<p style='font-size:15px;padding:12px;background:#fff3f3;border-left:4px solid #d32f2f;border-radius:4px'>" >> consolidated-report.html
            echo "<strong>Action required:</strong> ${t_fix} CVEs need fixes across ${num_comps} components. Click a component tab for details." >> consolidated-report.html
            echo "</p>" >> consolidated-report.html
          else
            echo "<p style='font-size:15px;padding:12px;background:#f0fff0;border-left:4px solid #388e3c;border-radius:4px'>" >> consolidated-report.html
            echo "<strong>All clear:</strong> No fixable CVEs found.</p>" >> consolidated-report.html
          fi
          echo '</div>' >> consolidated-report.html

          # Donut chart + component breakdown
          echo '<div style="display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;margin:16px 0">' >> consolidated-report.html

          # SVG donut — action-based categories
          echo '<div style="text-align:center">' >> consolidated-report.html
          echo '<svg viewBox="0 0 200 200" width="180" height="180">' >> consolidated-report.html
          if [ "$t_total" -gt 0 ]; then
            ang=-90
            for slice in "Fix:$t_fix:#d32f2f" "Safe:$t_nr:#2e7d32" "Skip/Other:$t_skip:#ffb300"; do
              count=$(echo "$slice" | cut -d: -f2)
              color=$(echo "$slice" | cut -d: -f3)
              [ "$count" -eq 0 ] && continue
              pct=$(echo "scale=4; $count / $t_total" | bc)
              end=$(echo "scale=4; $ang + $pct * 360" | bc)
              x1=$(echo "scale=4; 100 + 80 * c($ang * 3.14159/180)" | bc -l)
              y1=$(echo "scale=4; 100 + 80 * s($ang * 3.14159/180)" | bc -l)
              x2=$(echo "scale=4; 100 + 80 * c($end * 3.14159/180)" | bc -l)
              y2=$(echo "scale=4; 100 + 80 * s($end * 3.14159/180)" | bc -l)
              large=0; [ "$(echo "$pct > 0.5" | bc)" -eq 1 ] && large=1
              echo "<path d=\"M100,100 L${x1},${y1} A80,80 0 ${large},1 ${x2},${y2} Z\" fill=\"${color}\"/>" >> consolidated-report.html
              ang=$end
            done
            echo '<circle cx="100" cy="100" r="45" fill="#fff"/>' >> consolidated-report.html
            echo "<text x=\"100\" y=\"105\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"bold\">${t_total}</text>" >> consolidated-report.html
          fi
          echo '</svg>' >> consolidated-report.html
          echo "<div style='font-size:12px;color:#586069;margin-top:4px'>Total CVEs</div>" >> consolidated-report.html
          echo "<div style='margin-top:8px'>" >> consolidated-report.html
          echo "<span style='display:inline-block;width:10px;height:10px;background:#d32f2f;border-radius:50%'></span> Fix ${t_fix} &nbsp;" >> consolidated-report.html
          echo "<span style='display:inline-block;width:10px;height:10px;background:#2e7d32;border-radius:50%'></span> Safe ${t_nr} &nbsp;" >> consolidated-report.html
          echo "<span style='display:inline-block;width:10px;height:10px;background:#ffb300;border-radius:50%'></span> Skip ${t_skip}" >> consolidated-report.html
          echo '</div></div>' >> consolidated-report.html

          # Component breakdown table
          echo '<div style="flex:1;min-width:300px">' >> consolidated-report.html
          echo '<h3 style="margin-top:0">Component Breakdown</h3>' >> consolidated-report.html
          echo '<table><thead><tr><th>Component</th><th>Total</th><th>🔴 Fix</th><th>🟢 Safe</th><th>Jira</th><th>Discovered</th></tr></thead><tbody>' >> consolidated-report.html
          for f in *-scan.txt; do
            COMP=$(basename "$f" -scan.txt)
            S=$(tail -1 "$f")
            total_cves=$(echo "$S" | grep -oP '^\d+' || echo 0)
            fixable=$(echo "$S" | grep -oP '\d+(?= fixable)' || echo 0)
            nr=$(echo "$S" | grep -oP '\d+(?= not-reachable)' || echo 0)
            jira=$(echo "$S" | grep -oP '\d+(?= Jira)' || echo 0)
            disc=$(echo "$S" | grep -oP '\d+(?= discovered)' || echo 0)
            echo "<tr onclick=\"showTab('${COMP}')\" style='cursor:pointer'><td><strong>${COMP}</strong></td><td>${total_cves}</td><td style='color:#d32f2f;font-weight:600'>${fixable}</td><td style='color:#2e7d32'>${nr}</td><td>${jira}</td><td style='color:#f57c00'>${disc}</td></tr>" >> consolidated-report.html
          done
          echo '</tbody></table>' >> consolidated-report.html
          echo '</div></div>' >> consolidated-report.html
          echo '</div>' >> consolidated-report.html

          # Per-component tabs — iframe to the full HTML report
          for f in *-report.html; do
            COMP=$(basename "$f" -report.html)
            echo "<div id=\"tab-${COMP}\" class=\"tab-content\">" >> consolidated-report.html
            echo "<iframe src=\"${COMP}-report.html\" style=\"width:100%;height:85vh;border:1px solid #e1e4e8;border-radius:8px\"></iframe>" >> consolidated-report.html
            echo '</div>' >> consolidated-report.html
          done

          # Tab switching JS + mermaid for embedded reports
          cat >> consolidated-report.html <<'JSEOF'
          <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" integrity="sha384-yQ4mmBBT+vhTAwjFH0toJXNYJ6O4usWnt6EPIdWwrRvx2V/n5lXuDZQwQFeSFydF" crossorigin="anonymous"></script>
          <script>
          mermaid.initialize({startOnLoad:false,theme:'neutral',securityLevel:'loose'});
          function showTab(name){
            document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active')});
            document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active')});
            var tab=document.getElementById('tab-'+name);
            if(tab){
              tab.classList.add('active');
              tab.querySelectorAll('.mermaid:not([data-processed])').forEach(function(el){mermaid.run({nodes:[el]})});
            }
            document.querySelectorAll('.tab').forEach(function(el){if(el.textContent===name)el.classList.add('active')});
          }
          </script></body></html>
          JSEOF

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: vigil-report
          path: |
            consolidated-report.html
            *-report.html
            *-scan.txt
          retention-days: 90

      # Slack integration placeholder — uncomment and set SLACK_WEBHOOK_URL secret when ready
      #
      # - name: Post to Slack
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #   run: |
      #     for f in *-scan.txt; do
      #       COMP=$(basename "$f" -scan.txt)
      #       SUMMARY=$(tail -1 "$f")
      #       RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      #       curl -s -X POST "$SLACK_WEBHOOK_URL" \
      #         -H 'Content-Type: application/json' \
      #         --data-raw "{\"text\": \"🔍 Vigil weekly: *${COMP}*\n${SUMMARY}\n<${RUN_URL}|View>\"}"
      #     done
