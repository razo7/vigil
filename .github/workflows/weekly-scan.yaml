name: Weekly CVE Scan

on:
  schedule:
    # Every Monday at 07:03 UTC (off-minute to avoid :00 stampede)
    - cron: '3 7 * * 1'
  workflow_dispatch:
    inputs:
      components:
        description: 'Components to scan (JSON array)'
        type: string
        default: '["NMO"]'

permissions:
  contents: read

env:
  IMAGE: quay.io/oraz/vigil:latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Resolve components
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'matrix=["FAR","MDR","NHC","SNR","NMO"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=${{ inputs.components }}' >> "$GITHUB_OUTPUT"
          fi

  scan:
    name: Scan ${{ matrix.component }}
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - name: Pull Vigil image
        run: docker pull ${{ env.IMAGE }}

      # --go-version: GitHub Actions runners have no VPN access to gitlab.cee.redhat.com,
      # so downstream Containerfile fetch fails. Provide Go version explicitly to skip it.
      - name: Run scan
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --short --go-version 1.25.9 \
            2>&1 | tee ${{ matrix.component }}-raw.txt

          # Clean copy for artifact (no ANSI/OSC codes)
          sed 's/\x1b\[[0-9;]*m//g; s/\x1b]8;;[^\x1b]*\x1b\\//g' \
            ${{ matrix.component }}-raw.txt > ${{ matrix.component }}-scan.txt

      - name: Run scan (HTML report)
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --format html --verbose --go-version 1.25.9 \
            > ${{ matrix.component }}-report.html 2>${{ matrix.component }}-html-stderr.txt || true

      - name: Post summary
        if: always()
        run: |
          CLEAN=$(cat ${{ matrix.component }}-scan.txt)
          SUMMARY=$(echo "${CLEAN}" | tail -1)
          echo "::notice title=🔍 Vigil ${{ matrix.component }}::${SUMMARY}"

          {
            echo "## 🔍 Vigil Scan: ${{ matrix.component }}"
            echo ""
            echo "**Result:** ${SUMMARY}"
            echo ""

            # Build markdown table from scan output
            HEADER=$(echo "${CLEAN}" | grep "^SRC" | head -1)
            if [ -n "${HEADER}" ]; then
              # Convert space-aligned columns to markdown table
              echo "| SRC | TICKET | CREATED | UPDATED | CVE | VERSION | LANG | STATUS | CLASSIFICATION | PRIORITY | PACKAGE | CVSS | REACHABILITY |"
              echo "|-----|--------|---------|---------|-----|---------|------|--------|----------------|----------|---------|------|--------------|"
              echo "${CLEAN}" | grep -E "^(Jira |GVC  |Trivy )" | grep -v "Trivy found" | while IFS= read -r line; do
                # Parse fixed-width columns into pipe-delimited
                src=$(echo "$line" | awk '{print $1}')
                ticket=$(echo "$line" | awk '{print $2}')
                created=$(echo "$line" | awk '{print $3}')
                updated=$(echo "$line" | awk '{print $4}')
                cve=$(echo "$line" | awk '{print $5}')
                ver=$(echo "$line" | awk '{print $6}')
                lang=$(echo "$line" | awk '{print $7}')
                status=$(echo "$line" | awk '{print $8}')
                # Classification and beyond are multi-word, grab from known positions
                rest=$(echo "$line" | sed 's/^[^ ]* *[^ ]* *[^ ]* *[^ ]* *[^ ]* *[^ ]* *[^ ]* *[^ ]* *//')
                class=$(echo "$rest" | awk '{print $1" "$2}')
                prio=$(echo "$rest" | awk '{print $3}')
                pkg=$(echo "$rest" | awk '{print $4}')
                cvss=$(echo "$rest" | awk '{print $5}')
                reach=$(echo "$rest" | awk '{for(i=6;i<=NF;i++) printf "%s ", $i; print ""}' | sed 's/ *$//')

                # Add emojis
                case "$class" in
                  *"Fixable Now"*) class="🔴🔧 Fixable Now" ;;
                  *"Not Reachable"*) class="🟢✓ Not Reachable" ;;
                  *"Blocked"*) class="🟠⏳ Blocked" ;;
                  *"Not Go"*) class="🐍 Not Go" ;;
                  *"Misassigned"*) class="↩️ Misassigned" ;;
                esac
                case "$prio" in
                  Critical) prio="🔴 Critical" ;;
                  High) prio="🟠 High" ;;
                  Medium) prio="🟡 Medium" ;;
                  Low) prio="🟢 Low" ;;
                esac
                case "$reach" in
                  REACHABLE*) reach="🎯 $reach" ;;
                  PACKAGE*) reach="📦 $reach" ;;
                  MODULE*) reach="📋 $reach" ;;
                  NOT-IMPORTED*) reach="🚫 $reach" ;;
                  TEST-ONLY*) reach="🧪 $reach" ;;
                esac

                echo "| $src | $ticket | $created | $updated | $cve | $ver | $lang | $status | $class | $prio | $pkg | $cvss | $reach |"
              done
            fi
            echo ""
            echo "<details><summary>📄 Raw scan output</summary>"
            echo ""
            echo '```'
            echo "${CLEAN}"
            echo '```'
            echo "</details>"
            echo ""
            echo "📎 Download the full **HTML report** from [Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts) for charts and diagrams."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: vigil-${{ matrix.component }}-${{ github.run_number }}
          path: |
            ${{ matrix.component }}-scan.txt
            ${{ matrix.component }}-report.html
          retention-days: 90
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.setup.outputs.matrix) }}

  report:
    name: Weekly Report
    needs: scan
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vigil-*
          merge-multiple: true

      - name: Build consolidated summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "# 🔍 Vigil Weekly CVE Scan"
            echo ""
            echo "| Component | Assessed | Fixable | Not Reachable | Discovered | Full Result |"
            echo "|-----------|----------|---------|---------------|------------|-------------|"
            for f in *-scan.txt; do
              COMP=$(basename "$f" -scan.txt)
              SUMMARY=$(tail -1 "$f")
              assessed=$(echo "$SUMMARY" | grep -oP '\d+ assessed' || echo "0 assessed")
              fixable=$(echo "$SUMMARY" | grep -oP '\d+ fixable' || echo "0 fixable")
              notreach=$(echo "$SUMMARY" | grep -oP '\d+ not-reachable' || echo "0 not-reachable")
              disc=$(echo "$SUMMARY" | grep -oP '\d+ discovered[^,]*' || echo "0 discovered")
              echo "| **${COMP}** | ${assessed} | ${fixable} | ${notreach} | ${disc} | ${SUMMARY} |"
            done
            echo ""
            echo "📎 Download HTML reports from [Artifacts](${RUN_URL}#artifacts) below."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build consolidated HTML
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          cat > consolidated-report.html <<'HTMLEOF'
          <!DOCTYPE html><html><head><meta charset="utf-8">
          <title>Vigil Weekly Report</title>
          <style>
          body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:20px;color:#24292e}
          h1{border-bottom:1px solid #e1e4e8;padding-bottom:8px}
          .component{margin:24px 0;border:1px solid #e1e4e8;border-radius:8px;overflow:hidden}
          .component h2{background:#24292e;color:#fff;margin:0;padding:10px 16px;font-size:16px}
          .component iframe{width:100%;border:none;min-height:600px}
          .summary{background:#f6f8fa;padding:12px 16px;font-size:13px;border-bottom:1px solid #e1e4e8}
          </style></head><body>
          <h1>🔍 Vigil Weekly CVE Scan</h1>
          HTMLEOF

          echo "<p>Generated: $(date -u '+%Y-%m-%d %H:%M UTC')</p>" >> consolidated-report.html

          for f in *-report.html; do
            COMP=$(basename "$f" -report.html)
            SUMMARY=$(tail -1 "${COMP}-scan.txt" 2>/dev/null || echo "no data")
            echo "<div class='component'>" >> consolidated-report.html
            echo "<h2>📦 ${COMP}</h2>" >> consolidated-report.html
            echo "<div class='summary'>${SUMMARY}</div>" >> consolidated-report.html
            echo "<iframe srcdoc='$(sed "s/'/\&#39;/g" "$f")' loading='lazy'></iframe>" >> consolidated-report.html
            echo "</div>" >> consolidated-report.html
          done

          echo "</body></html>" >> consolidated-report.html

      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: vigil-weekly-report-${{ github.run_number }}
          path: consolidated-report.html
          retention-days: 90

