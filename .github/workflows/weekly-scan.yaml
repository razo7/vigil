name: Weekly CVE Scan

on:
  schedule:
    # Every Monday at 07:03 UTC (off-minute to avoid :00 stampede)
    - cron: '3 7 * * 1'
  workflow_dispatch:
    inputs:
      components:
        description: 'Components to scan (JSON array)'
        type: string
        default: '["NMO"]'

permissions:
  contents: read

env:
  IMAGE: quay.io/oraz/vigil:latest

jobs:
  setup:
    name: Resolve components
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'matrix=["FAR","MDR","NHC","SNR","NMO"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=${{ inputs.components }}' >> "$GITHUB_OUTPUT"
          fi

  scan:
    name: Scan ${{ matrix.component }}
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Pull Vigil image
        run: docker pull ${{ env.IMAGE }}

      # --go-version: GitHub Actions runners have no VPN access to gitlab.cee.redhat.com,
      # so downstream Containerfile fetch fails. Provide Go version explicitly to skip it.
      - name: Run scan (terminal output)
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --short --go-version 1.25.9 \
            2>&1 | tee ${{ matrix.component }}-scan.txt

      - name: Run scan (HTML report)
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --format html --verbose --go-version 1.25.9 \
            > ${{ matrix.component }}-report.html 2>${{ matrix.component }}-html-stderr.txt || true

      - name: Post summary
        if: always()
        run: |
          SUMMARY=$(tail -1 ${{ matrix.component }}-scan.txt | sed 's/\x1b\[[0-9;]*m//g')
          echo "::notice title=Vigil ${{ matrix.component }}::${SUMMARY}"
          echo "## 🔍 Vigil Scan: ${{ matrix.component }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Result:** ${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          sed 's/\x1b\[[0-9;]*m//g' ${{ matrix.component }}-scan.txt | sed 's/]8;;[^\\]*\\//g' | sed 's/]8;;\\//g' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: vigil-${{ matrix.component }}-${{ github.run_number }}
          path: |
            ${{ matrix.component }}-scan.txt
            ${{ matrix.component }}-report.html
          retention-days: 90

      # Slack integration placeholder — uncomment and set SLACK_WEBHOOK_URL secret when ready
      #
      # - name: Post to Slack
      #   if: always()
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #     SCAN_COMPONENT: ${{ matrix.component }}
      #     SCAN_SUMMARY: ${{ steps.summary.outputs.summary }}
      #     RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      #   run: |
      #     curl -s -X POST "$SLACK_WEBHOOK_URL" \
      #       -H 'Content-Type: application/json' \
      #       --data-raw "{\"text\": \"🔍 Vigil weekly scan: *${SCAN_COMPONENT}*\n${SCAN_SUMMARY}\n<${RUN_URL}|View reports>\"}"

  summary:
    name: Consolidated Summary
    needs: scan
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vigil-*
          merge-multiple: true

      - name: Build consolidated summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "# 🔍 Vigil Weekly CVE Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Result | Report |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for f in *-scan.txt; do
            COMP=$(basename "$f" -scan.txt)
            SUMMARY=$(tail -1 "$f" | sed 's/\x1b\[[0-9;]*m//g')
            echo "| ${COMP} | ${SUMMARY} | [HTML](${RUN_URL}#artifacts) |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "📎 Download HTML reports from the Artifacts section below." >> "$GITHUB_STEP_SUMMARY"
