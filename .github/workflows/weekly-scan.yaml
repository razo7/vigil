name: Weekly CVE Scan

on:
  schedule:
    # Every Monday at 07:03 UTC (off-minute to avoid :00 stampede)
    - cron: '3 7 * * 1'
  workflow_dispatch:
    inputs:
      components:
        description: 'Components to scan (JSON array)'
        type: string
        default: '["NMO"]'

permissions:
  contents: read

env:
  IMAGE: quay.io/oraz/vigil:latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Resolve components
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'matrix=["FAR","MDR","NHC","SNR","NMO"]' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix=${{ inputs.components }}' >> "$GITHUB_OUTPUT"
          fi

  scan:
    name: Scan ${{ matrix.component }}
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - name: Pull Vigil image
        run: docker pull ${{ env.IMAGE }}

      # --go-version: GitHub Actions runners have no VPN access to gitlab.cee.redhat.com,
      # so downstream Containerfile fetch fails. Provide Go version explicitly to skip it.
      # --color: force colored output since CI is not a TTY.
      - name: Run scan (terminal output)
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --short --go-version 1.25.9 --color \
            2>&1 | sed 's/\x1b]8;;[^\x1b]*\x1b\\//g' | tee ${{ matrix.component }}-scan.txt

      - name: Run scan (HTML report)
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        run: |
          docker run --rm \
            -e JIRA_API_TOKEN \
            -e JIRA_EMAIL \
            ${{ env.IMAGE }} scan --component ${{ matrix.component }} --format html --verbose --go-version 1.25.9 \
            > ${{ matrix.component }}-report.html 2>${{ matrix.component }}-html-stderr.txt || true

      - name: Post summary
        if: always()
        run: |
          CLEAN=$(sed 's/\x1b\[[0-9;]*m//g; s/\x1b]8;;[^\x1b]*\x1b\\//g' ${{ matrix.component }}-scan.txt)
          SUMMARY=$(echo "${CLEAN}" | tail -1)
          echo "::notice title=🔍 Vigil ${{ matrix.component }}::${SUMMARY}"

          {
            echo "## 🔍 Vigil Scan: ${{ matrix.component }}"
            echo ""
            echo "**Result:** ${SUMMARY}"
            echo ""
            echo "${CLEAN}" | grep -E "^(SRC|Jira|GVC|Trivy)" | sed \
              -e 's/Fixable Now/🔴🔧 Fixable Now/g' \
              -e 's/Not Reachable/🟢✓ Not Reachable/g' \
              -e 's/Blocked by Go/🟠⏳ Blocked by Go/g' \
              -e 's/Not Go/🐍 Not Go/g' \
              -e 's/Misassigned/↩️ Misassigned/g' \
              -e 's/Critical/🔴 Critical/g' \
              -e 's/High/🟠 High/g' \
              -e 's/Medium/🟡 Medium/g' \
              -e 's/Low/🟢 Low/g' \
              -e 's/REACHABLE/🎯 REACHABLE/g' \
              -e 's/PACKAGE-LEVEL/📦 PACKAGE-LEVEL/g' \
              -e 's/MODULE-LEVEL/📋 MODULE-LEVEL/g' \
              -e 's/NOT-IMPORTED/🚫 NOT-IMPORTED/g' \
              -e 's/TEST-ONLY/🧪 TEST-ONLY/g' | while IFS= read -r line; do
              echo "${line}  "
            done
            echo ""
            echo "<details><summary>📄 Raw scan output</summary>"
            echo ""
            echo '```'
            echo "${CLEAN}"
            echo '```'
            echo "</details>"
            echo ""
            echo "📎 Download the full **HTML report** from Artifacts for charts and diagrams."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: vigil-${{ matrix.component }}-${{ github.run_number }}
          path: |
            ${{ matrix.component }}-scan.txt
            ${{ matrix.component }}-report.html
          retention-days: 90
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.setup.outputs.matrix) }}

  summary:
    name: Consolidated Summary
    needs: scan
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vigil-*
          merge-multiple: true

      - name: Build consolidated summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "# 🔍 Vigil Weekly CVE Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for f in *-scan.txt; do
            COMP=$(basename "$f" -scan.txt)
            SUMMARY=$(sed 's/\x1b\[[0-9;]*m//g; s/\x1b]8;;[^\x1b]*\x1b\\//g' "$f" | tail -1)
            echo "| **${COMP}** | ${SUMMARY} |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "📎 Full HTML reports available in the **Artifacts** section at the bottom of this page." >> "$GITHUB_STEP_SUMMARY"

      # Slack integration placeholder — uncomment and set SLACK_WEBHOOK_URL secret when ready
